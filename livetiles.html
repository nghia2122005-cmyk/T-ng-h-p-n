<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Live Tiles</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    :root{
      --page-width:1200px;
      --top:#0b6d96;
      --mid:#8ea8da;
      --bottom:#0a79c7;
      --gap:6px;
      --tile-h:84px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      background:#fff;
      font-family:Arial,Helvetica,sans-serif;
      min-width:1200px;
    }
    .wrap{width:var(--page-width);margin:0 auto;padding-top:2px}
    .header{display:grid;grid-template-columns:1fr 180px;min-height:114px;background:var(--top)}
    .title{display:flex;align-items:center;padding:18px 26px;color:#fff}
    .title h1{margin:0;font-size:44px;line-height:1.08;font-weight:300;text-transform:uppercase}
    .thumb{background:#f2f2f2;display:flex;align-items:center;justify-content:center;border-left:1px solid rgba(0,0,0,.08)}
    .thumb img{max-width:100%;display:block}
    .band-top{height:58px;background:var(--mid);border-top:4px solid #fff;border-bottom:4px solid #fff}
    .tiles{background:var(--mid);padding-bottom:4px}
    .row-tiles{display:grid;gap:var(--gap);margin-bottom:var(--gap)}
    .row-tiles:last-child{margin-bottom:0}
    .r1{grid-template-columns:1fr 1fr 2.25fr 1.15fr 1.15fr}
    .r2{grid-template-columns:1fr 1fr 1.15fr 1.15fr 2.3fr}
    .r3{grid-template-columns:1fr 1fr 2.25fr 1.15fr 1.15fr}
    .tile{height:var(--tile-h);border:1px solid rgba(255,255,255,.8)}
    .lime{background:#b7e93d}.sky{background:#48ade0}.lav{background:#8aa4d7}.purple{background:#7938ab}.blue{background:#2c8bc7}
    .green{background:#06b74d}.red{background:#d80000}.yellow{background:#f5c000}.yellowgreen{background:#a5cf24}
    .sand{background:#f0c768}.gray{background:#9a9a9a}.navy{background:#00557f}.cyan{background:#79bdd8}.teal{background:#2c7b95}
    .band-bottom{height:58px;background:var(--bottom);border-top:4px solid #fff}
  </style>
</head>
<body>
  <div class="wrap">
    <section class="header">
      <div class="title"><h1>Chia bố cục theo phong cách live tiles</h1></div>
      <div class="thumb"><img src="assets/__utm.gif" alt="WWW"></div>
    </section>
    <div class="band-top"></div>
    <section class="tiles">
      <div class="row-tiles r1">
        <div class="tile lime"></div>
        <div class="tile sky"></div>
        <div class="tile lav"></div>
        <div class="tile purple"></div>
        <div class="tile blue"></div>
      </div>
      <div class="row-tiles r2">
        <div class="tile green"></div>
        <div class="tile lav"></div>
        <div class="tile red"></div>
        <div class="tile yellow"></div>
        <div class="tile yellowgreen"></div>
      </div>
      <div class="row-tiles r3">
        <div class="tile sand"></div>
        <div class="tile gray"></div>
        <div class="tile navy"></div>
        <div class="tile cyan"></div>
        <div class="tile teal"></div>
      </div>
    </section>
    <div class="band-bottom"></div>
  </div>
</body>
</html>
